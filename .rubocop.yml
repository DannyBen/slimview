plugins:
  - rubocop-performance
  - rubocop-rspec

inherit_gem:
  rentacop:
    - rentacop.yml
    - rspec.yml

AllCops:
  TargetRubyVersion: 3.2
  SuggestExtensions: false
  Exclude:
    - dev/**/*

Metrics/AbcSize:
  Exclude:
    - lib/slimview/app.rb

Lint/UselessAssignment:
  Exclude:
    # Template context files intentionally define locals consumed by Slim.
    - lib/slimview/templates/context.rb
    - spec/fixtures/templates/context.rb
